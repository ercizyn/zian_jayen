<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #4facfe, #dbefff);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .search-box{
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button{
            display: flex-inline;
            background: #2f65c7;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }


        #hasil{
             margin-top: 20px;
              padding: 20px;
              background: #f3f8ff;
              border-radius: 12px;
              border-left: 5px solid #2f65c7;
              box-shadow: 0 3px 10px rgba(0,0,0,0.1);
              width: 300px;
        }

        #hasil h3{
            color: #2f65c7;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    
    <h1>Informasi cuaca</h1>

    <div class="search-box">
        <input type="text" id="kota" placeholder="Masukkan nama kota">
        <button onclick="ambilCuaca()">Lihat Cuaca</button>
    </div>

    <div id="hasil"></div>

    <script>
        const apiKey = 'dc4397c4810a491393e08d2b6b8c787d';
        function ambilCuaca() {
            const kota = document.getElementById('kota').value;
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${kota}&appid=${apiKey}&units=metric`;

            fetch(url)
        .then((response) => {
            if (!response.ok) {
                throw new Error("Kota tidak ditemukan!");
            }
            return response.json();
        })
        .then((data) => {
            const suhu = data.main.temp;
            const cuaca = data.weather[0].description;
            const kelembaban = data.main.humidity;
            const nama = data.name;

            document.getElementById("hasil").innerHTML = `
                <h3>Cuaca di ${nama}</h3>
                <p>Suhu: ${suhu}°C</p>
                <p>Cuaca: ${cuaca}</p>
                <p>Kelembaban: ${kelembaban}%</p>
            `;
        })
        .catch((error) => {
            document.getElementById("hasil").innerHTML = `
                <p style="color:red">${error.message}</p>
            `;
        });
}
    </script>
</body>
</html>
